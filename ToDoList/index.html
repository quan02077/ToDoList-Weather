<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<title>To Do List</title>
</head>

<body>
    <div class="container">
        <div class="row mt-5 bg-light rounded">
            <h1 class="fw-bold text-center text-danger">To Do List</h1>
            <p class="text-center text-primary">Đây là một ứng dụng đơn giản để quản lý các công việc hàng ngày.</p>
        </div>
        <div class="row mt-5 p-5 bg-light rounded">
            <div class="row mb-4">
                <button class="btn btn-primary">Thêm công việc</button>
            </div>
            <div class="col-4">
                <div class="card">
                    <div class="card-body">
                        <p class="card-text text-center"><strong>Thêm công việc</strong></p>
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Tên công việc:</label>
                                <input type="text" class="form-control" placeholder="Nhập tên công việc">
                            </div>
                            <button type="submit" class="btn btn-success">Lưu</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-8">
                <div class="card">
                    <div class="card-body">
                        <p class="card-text text-center"><strong>Danh sách công việc</strong></p>
                        <table class="table">
                            <thead>
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">Tên công việc</th>
                                    <th scope="col">Trạng thái</th>
                                    <th scope="col" class="text-center">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th scope="row">1</th>
                                    <td>Đi chợ</td>
                                    <td><span class="badge bg-warning text-dark">Chưa hoàn thành</span></td>
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-danger">Xóa</button>
                                        <button class="btn btn-sm btn-warning">Chỉnh sửa</button>
                                        <button class="btn btn-sm btn-success">Hoàn thành</button>
                                    </td>
                                </tr>
                                <tr>
                                    <th scope="row">2</th>
                                    <td>Học lập trình</td>
                                    <td><span class="badge bg-success">Đã hoàn thành</span></td>
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-danger">Xóa</button>
                                        <button class="btn btn-sm btn-warning">Chỉnh sửa</button>
                                        <button class="btn btn-sm btn-success">Hoàn thành</button>
                                    </td>
                                </tr>
                            </tbody>

                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
